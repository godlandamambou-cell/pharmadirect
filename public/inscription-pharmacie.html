<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Partenaire - PharmaDirect</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .reg-card { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #2ecc71; text-align: center; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; }
        .full { grid-column: span 2; }
        button { width: 100%; padding: 15px; background: #2ecc71; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #27ae60; }
        .note { font-size: 12px; color: #7f8c8d; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="reg-card">
    <h2>Inscription Pharmacie Partenaire</h2>
    <form action="/register-pharmacy" method="POST">
        <div class="grid">
            <div class="full">
                <label>Nom de la Pharmacie</label>
                <input type="text" name="nomPharmacie" placeholder="Ex: Pharmacie du Centre" required>
            </div>
            
            <div class="full">
                <label>Adresse Complète (Kinshasa / Province)</label>
                <input type="text" name="adresse" placeholder="N°, Avenue, Quartier, Commune" required>
            </div>

            <div>
                <label>Nom du Pharmacien</label>
                <input type="text" name="nomPharmacien" placeholder="Nom et Prénom" required>
            </div>

            <div>
                <label>Numéro CNOP (Format: 0000/XX)</label>
                <input type="text" name="cnop" placeholder="Ex: 1234/21" pattern="[0-9]{4}/[0-9]{2}" title="Le format doit être 1234/21" required>
            </div>

            <div>
                <label>Téléphone Professionnel</label>
                <input type="tel" name="telephone" placeholder="+243..." required>
            </div>

            <div>
                <label>Email (Validation requise)</label>
                <input type="email" name="email" placeholder="pharmacie@exemple.com" required>
            </div>

            <div class="full">
                <label>Créer un Mot de Passe de Sécurité</label>
                <input type="password" name="password" placeholder="Minimum 8 caractères" minlength="8" required>
            </div>
        </div>
        
        <button type="submit">Valider mon Inscription</button>
        <p class="note">En cliquant, vous certifiez l'exactitude des documents légaux de votre officine.</p>
    </form>
</div>

</body>
</html>
