<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaDirect - Envoyer Ordonnance</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #2ecc71; text-align: center; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-size: 18px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PharmaDirect</h1>
        <form action="/commander" method="POST">
            <label>Votre Nom complet :</label>
            <input type="text" name="client" placeholder="Ex: Arland Landamambou" required>
            
            <label>Photo de l'ordonnance :</label>
            <input type="file" name="ordonnance" accept="image/*">
            
            <button type="submit" class="btn">ENVOYER LA COMMANDE</button>
        </form>
        <p style="text-align: center;"><a href="/" style="color: #777;">Retour à la connexion</a></p>
    </div>
</body>
</html>
