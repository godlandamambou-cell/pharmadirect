<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Pharmacie</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .alert-box { background: #e74c3c; color: white; padding: 20px; border-radius: 10px; display: none; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Espace Pharmacien</h1>
    <div id="notif" class="alert-box">🚨 NOUVELLE COMMANDE REÇUE !</div>
    <div style="background: white; padding: 20px; border-radius: 10px;">
        <h3>Commandes en attente</h3>
        <p>Les nouvelles ordonnances apparaîtront ici avec une alerte sonore.</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const pharmaId = 101; // ID statique pour le test
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        socket.emit('join-pharma', pharmaId);

        socket.on('alerte-sonore', (data) => {
            document.getElementById('notif').style.display = 'block';
            audio.play().catch(() => console.log("Cliquez sur la page pour activer le son"));
            alert(data.message);
        });
    </script>
</body>
</html>
