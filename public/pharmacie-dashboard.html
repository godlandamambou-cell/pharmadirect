<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pharma - PharmaDirect</title>
    <style>
        body { font-family:sans-serif; background:#f4f7f6; padding:30px; }
        .notif { display:none; background:#e74c3c; color:white; padding:20px; border-radius:15px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.5;} 100% {opacity:1;} }
    </style>
</head>
<body>
    <h1>Tableau de Bord Pharmacie</h1>
    <div id="alerte" class="notif">🚨 NOUVELLE ORDONNANCE REÇUE !</div>
    
    <div style="background:white; padding:20px; border-radius:15px; margin-top:20px;">
        <h3>Commandes à traiter</h3>
        <p id="msg">En attente de commandes...</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const sound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        socket.emit('join-pharma', 101); // Simulation ID

        socket.on('alerte-sonore', (data) => {
            document.getElementById('alerte').style.display = 'block';
            document.getElementById('msg').innerText = "Commande de : " + data.clientNom;
            sound.play();
        });
    </script>
</body>
</html>
