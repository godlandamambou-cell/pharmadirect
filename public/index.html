<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaDirect - Unique</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --p: #2ecc71; --s: #1e293b; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; }
        .hidden { display: none !important; }
        .screen { padding: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { width: 100%; padding: 12px; background: var(--p); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        #chat { height: 200px; overflow-y: auto; background: #eee; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .gain { font-size: 32px; color: var(--p); font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <div class="card">
            <h2 id="auth-title">Connexion PharmaDirect</h2>
            <input type="text" id="login" placeholder="Login">
            <input type="password" id="mdp" placeholder="Mot de passe">
            <button onclick="seConnecter()">SE CONNECTER</button>
            <p style="text-align:center" onclick="basculer()">Pas de compte ? S'inscrire</p>
        </div>
    </div>

    <div id="client-screen" class="screen hidden">
        <div class="card"><h3>Bienvenue <span id="user-nom"></span></h3></div>
        <div class="card">
            <h4>Payer Médicament (50.000 FC)</h4>
            <button onclick="payer(50000)">ACHETER MAINTENANT</button>
        </div>
        <div class="card">
            <h4>Chat avec Pharmacie</h4>
            <div id="chat-client" style="height:100px; background:#f9f9f9; padding:5px;"></div>
            <input type="text" id="msg-client" placeholder="Message...">
            <button onclick="envoyerMsg('pharma_1', 'msg-client')">Envoyer</button>
        </div>
    </div>

    <div id="pharma-screen" class="screen hidden">
        <div class="card"><h3>Tableau de Bord Officine</h3></div>
        <div id="commandes-pharma"></div>
    </div>

    <div id="admin-screen" class="screen hidden">
        <h2 style="color:var(--s)">🛡️ Meta-Control Arland</h2>
        <div class="card">
            <p>Mes Commissions (10%)</p>
            <div id="gain-total" class="gain">0 FC</div>
        </div>
        <div class="card" style="background: #000; color: #0f0; font-family: monospace;">
            <h4>Surveillance des flux</h4>
            <div id="admin-logs"></div>
        </div>
        <audio id="son-cash" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    </div>

<script>
    const socket = io();
    let currentUser = null;

    async function seConnecter() {
        const login = document.getElementById('login').value;
        const mdp = document.getElementById('mdp').value;
        const res = await fetch('/auth', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ login, mdp, action: 'login' })
        });
        const user = await res.json();
        if(user.id) {
            currentUser = user;
            socket.emit('join', user.id);
            afficherInterface(user.role);
        } else { alert("Erreur identifiants"); }
    }

    function afficherInterface(role) {
        document.getElementById('auth-screen').classList.add('hidden');
        if(role === 'ADMIN') document.getElementById('admin-screen').classList.remove('hidden');
        if(role === 'CLIENT') {
            document.getElementById('client-screen').classList.remove('hidden');
            document.getElementById('user-nom').innerText = currentUser.nom;
        }
        if(role === 'PHARMA') document.getElementById('pharma-screen').classList.remove('hidden');
    }

    function payer(montant) {
        socket.emit('paiement-client', { montant, client: currentUser.nom, pharmaId: 'pharma_1', pharmaNom: 'Pharmacie Gombe' });
        alert("Paiement envoyé !");
    }

    // --- ECOUTEURS SOCKET ---
    socket.on('alerte-admin-commission', d => {
        document.getElementById('son-cash').play();
        const logs = document.getElementById('admin-logs');
        logs.innerHTML += `<p>> Commission: +${d.commission} FC (Vente de ${d.montant})</p>`;
        // Mise à jour solde simplifié
        let actuel = parseInt(document.getElementById('gain-total').innerText);
        document.getElementById('gain-total').innerText = (actuel + d.commission) + " FC";
    });

    socket.on('surveillance-admin', d => {
        document.getElementById('admin-logs').innerHTML += `<p style="color:#888">> CHAT: ${d.from} dit "${d.msg}"</p>`;
    });
</script>
</body>
</html>
