<div class="login-card">
    <div class="logo-container">
        <h1 style="color:#2ecc71;">PharmaDirect</h1> 
    </div>
    
    <p class="subtitle">Soignez-vous sans bouger de chez vous.</p>

    <form action="/login" method="POST">
        <div class="input-group">
            <input type="text" name="username" placeholder="Identifiant ou Email" required>
        </div>
        
        <div class="input-group">
            <input type="password" name="password" placeholder="Mot de passe" required>
        </div>

        <button type="submit" class="btn-login">Se connecter</button>
    </form>

    <div class="footer-links">
        <p>Vous êtes une pharmacie ? <a href="/inscription">Rejoindre le réseau</a></p>
        <p>Patient ? <a href="/ordonnance">Envoyer une ordonnance ici</a></p>
    </div>
</div>
